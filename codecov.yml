codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "header, reach, diff, flags, components, files, footer"
  behavior: default
  require_changes: false
  hide_project_coverage: false

ignore:
  - "src/test/**"
  - "src/config/**"
  - "src/**/*.module.ts"
  - "src/main.ts"
  - "src/**/index.ts"
  - "src/graphql/graphql.types.ts"
