codecov:
  require_ci_to_pass: false

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

ignore:
  - "src/test/**"
  - "src/config/**"
  - "src/**/*.module.ts"
  - "src/main.ts"
  - "src/**/index.ts"
  - "src/graphql/graphql.types.ts"
