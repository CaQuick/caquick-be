extend type Query {
  """내 주문 목록 조회"""
  myOrders(input: MyOrdersInput): MyOrderConnection!
}

"""내 주문 조회 입력"""
input MyOrdersInput {
  """상태 필터 (복수 선택 가능). 미지정 시 전체"""
  statuses: [OrderStatusType!]
  offset: Int = 0
  limit: Int = 20
}

"""주문 목록 응답"""
type MyOrderConnection {
  items: [MyOrderSummary!]!
  totalCount: Int!
  hasMore: Boolean!
}

"""유저 주문 목록 카드"""
type MyOrderSummary {
  orderId: ID!
  orderNumber: String!
  status: OrderStatusType!
  createdAt: DateTime!
  pickupAt: DateTime!
  """대표 상품명 (첫 OrderItem 기준)"""
  representativeProductName: String!
  """대표 상품 이미지 URL"""
  representativeProductImageUrl: String
  """주문에 포함된 추가 상품 종류 수 (첫 아이템 제외)"""
  additionalItemCount: Int!
  """총 가격"""
  totalPrice: Int!
  """매장명"""
  storeName: String!
}
