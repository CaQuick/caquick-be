name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  # PR push: 같은 PR의 이전 실행을 취소
  # main/develop push: 커밋별로 독립 실행 (base 커버리지 업로드 유실 방지)
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js (24.x) & Yarn cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.x"
          cache: "yarn"

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: GraphQL codegen
        run: yarn graphql:codegen

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Test with coverage
        run: yarn test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Build
        run: |
          yarn graphql:docs
          yarn build

  coverage-report:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js (24.x) & Yarn cache
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24.x"
          cache: "yarn"

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Coverage Report (jest-coverage-report)
        uses: ArtiomTr/jest-coverage-report-action@7f750dd50f5585533321eb7ebc482b936b49a5d4 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-script: yarn jest --coverage --ci
          skip-step: install
          annotations: failed-tests

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        with:
          subjectPattern: ^.+$
          subjectPatternError: |
            PR 제목이 Conventional Commits 형식이 아닙니다.
            예: "feat: 새 기능 추가", "fix: 버그 수정"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
