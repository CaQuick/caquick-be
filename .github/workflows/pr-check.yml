name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  # PR push: 같은 PR의 이전 실행을 취소
  # main/develop push: 커밋별로 독립 실행 (base 커버리지 업로드 유실 방지)
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js (24.x) & Yarn cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          cache: "yarn"

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: GraphQL codegen
        run: yarn graphql:codegen

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Test with coverage
        run: yarn test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          # disable_search: 지정한 파일만 업로드 (자동 탐색 결과와 섞이지 않도록)
          disable_search: true
          name: backend-lcov
          # 업로드 실패 시 조용히 넘어가지 않고 CI 실패로 가시화 (진단/운영 모두 권장).
          fail_ci_if_error: true
          verbose: true

      - name: Build
        run: |
          yarn graphql:docs
          yarn build

  coverage-report:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js (24.x) & Yarn cache
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          cache: "yarn"

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Coverage Report (jest-coverage-report)
        uses: ArtiomTr/jest-coverage-report-action@7f750dd50f5585533321eb7ebc482b936b49a5d4 # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          test-script: yarn jest --coverage --ci
          skip-step: install
          annotations: failed-tests

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        with:
          subjectPattern: ^.+$
          subjectPatternError: |
            PR 제목이 Conventional Commits 형식이 아닙니다.
            예: "feat: 새 기능 추가", "fix: 버그 수정"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
