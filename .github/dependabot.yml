# Dependabot 자동 업데이트 설정.
# - npm: 애플리케이션 런타임/개발 의존성
# - github-actions: 워크플로에서 사용하는 액션 버전 (SHA pin 포함)
# 보안 패치는 별도 PR로 우선 생성되며, 일반 업데이트는 묶어서 노이즈를 줄인다.
version: 2
updates:
  # --- npm ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "📦 Dependencies"
    commit-message:
      # include: scope 가 (deps) / (deps-dev) 를 자동으로 붙여준다.
      # prefix에 (deps)를 또 적으면 "chore(deps)(deps): ..." 처럼 중복된다.
      prefix: "chore"
      include: "scope"
    groups:
      # minor/patch는 묶어서 한 PR로
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # 보안 패치는 메이저 포함해 별도로 묶음 (빠르게 머지하기 위함)
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Prisma 계열은 schema 마이그레이션 호환성 확인 필요 → 수동 업데이트
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      # NestJS 메이저 업그레이드는 broad impact라 수동 검토
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]
      # Jest 계열: 실DB 테스트 인프라 안정화 이후 일괄 업그레이드
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/jest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "ts-jest"
        update-types: ["version-update:semver-major"]
      # ESLint 생태계: eslint / typescript-eslint / eslint-plugin-* 는 같이 움직여야 함
      # (eslint-plugin-import와 typescript-eslint가 eslint 신메이저를 늦게 지원)
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-config-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      # TypeScript 메이저: rootDir/strict 검증 강화 등 tsconfig & 코드 변경 필요
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # openid-client v6: v5 대비 API 전면 재설계 (Issuer/Client/TokenSet 제거)
      # → oidc-client.service.ts 재작성 동반되는 별도 마이그레이션 PR로 처리
      - dependency-name: "openid-client"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "📦 Dependencies"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
