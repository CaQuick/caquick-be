# Dependabot 자동 업데이트 설정.
# - npm: 애플리케이션 런타임/개발 의존성
# - github-actions: 워크플로에서 사용하는 액션 버전 (SHA pin 포함)
# 보안 패치는 별도 PR로 우선 생성되며, 일반 업데이트는 묶어서 노이즈를 줄인다.
version: 2
updates:
  # --- npm ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      # include: scope 가 (deps) / (deps-dev) 를 자동으로 붙여준다.
      # prefix에 (deps)를 또 적으면 "chore(deps)(deps): ..." 처럼 중복된다.
      prefix: "chore"
      include: "scope"
    groups:
      # minor/patch는 묶어서 한 PR로
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      # 보안 패치는 메이저 포함해 별도로 묶음 (빠르게 머지하기 위함)
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      # Prisma 계열은 schema 마이그레이션 호환성 확인 필요 → 수동 업데이트
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      # NestJS 메이저 업그레이드는 broad impact라 수동 검토
      - dependency-name: "@nestjs/*"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
